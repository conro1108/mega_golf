<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>mega golf</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/icon-192.png" />
    <meta name="theme-color" content="#171326" />
    <!-- Standalone-mode iOS PWA support: no browser chrome, no bounce-scroll. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mega Golf" />
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0b14;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        display: grid;
        place-items: center;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        /* Keep the canvas clear of a notch/home-indicator in standalone mode. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        box-sizing: border-box;
      }
      canvas {
        image-rendering: pixelated;
        display: block;
      }
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #0d0b14;
        color: #f2d24b;
        font: 16px monospace;
        text-align: center;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      /* This is a landscape, scrolling-fairway game — on a touch device held
         portrait it would only ever render tiny and letterboxed, so ask for
         a rotate instead of trying to squeeze a wide hole into a tall screen. */
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-hint {
          display: flex;
        }
        canvas {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="rotate-hint">rotate your phone to landscape&nbsp;⟳<br />mega golf plays sideways</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
