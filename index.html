<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>mega golf</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0b14;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        display: grid;
        place-items: center;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        image-rendering: pixelated;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
